services:
  autpixel:
    build: .
    container_name: autpixel
    restart: on-failure:3
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - HEADLESS=true
    volumes:
      - ./logs:/app/logs
    # Resource limits for 2.5GB RAM / 2 CPU servers
    deploy:
      resources:
        limits:
          memory: 1536M
          cpus: "1.5"
        reservations:
          memory: 512M
    shm_size: "512m"  # Shared memory for Chrome headless (needs more for JS injection)
